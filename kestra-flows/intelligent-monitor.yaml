id: intelligent-monitor
namespace: sentinel

tasks:
  # Debug log to confirm the flow runs every 30 seconds
  - id: debug-start
    type: io.kestra.plugin.core.log.Log
    message: "==== SENTINEL execution tick - {{ execution.id }} - {{ now() }} ===="

  # 1. Fetch Health Data (Parallel)
  - id: fetch-metrics
    type: io.kestra.plugin.core.flow.Parallel
    allowFailure: true
    tasks:
      - id: get-auth
        type: io.kestra.plugin.core.http.Request
        uri: http://auth-service:3001/health
        allowFailure: true

      - id: get-payment
        type: io.kestra.plugin.core.http.Request
        uri: http://payment-service:3002/health
        allowFailure: true

      - id: get-notify
        type: io.kestra.plugin.core.http.Request
        uri: http://notification-service:3003/health
        allowFailure: true

      - id: get-containers
        type: io.kestra.plugin.core.http.Request
        uri: http://host.docker.internal:4000/api/docker/containers
        method: GET
        allowFailure: true


  # 2. Check if any service is down
  - id: check-failures
    type: io.kestra.plugin.core.flow.If
    condition: >
      {{ 
        (outputs['get-auth'].code | default(500)) != 200 or
        (outputs['get-payment'].code | default(500)) != 200 or
        (outputs['get-notify'].code | default(500)) != 200
      }}
    then:
      - id: log-failure-detected
        type: io.kestra.plugin.core.log.Log
        message: "⚠️ FAILURE DETECTED - Starting auto-healing process..."

    else:
      - id: log-healthy
        type: io.kestra.plugin.core.log.Log
        message: "✅ All services healthy - System Normal"

  # 3. Human-in-the-Loop: Submit approval for Auth Service
  - id: heal-auth
    type: io.kestra.plugin.core.flow.If
    condition: "{{ (outputs['get-auth'].code | default(500)) != 200 }}"
    then:
      - id: log-auth-pending
        type: io.kestra.plugin.core.log.Log
        message: "🕐 AUTH SERVICE DOWN - Submitting for approval..."
      - id: submit-auth-approval
        type: io.kestra.plugin.core.http.Request
        uri: http://host.docker.internal:4000/api/approvals/pending
        method: POST
        contentType: application/json
        allowFailure: true
        body: >
          {
            "service": "auth",
            "action": "restart",
            "containerId": "{{ outputs['get-containers'].body | jq('.containers[] | select(.name == \"auth-service\") | .id') | first | replace('\"', '') }}",
            "reason": "Auth service health check failed (HTTP {{ outputs['get-auth'].code | default('N/A') }})"
          }
      - id: check-auth-submission
        type: io.kestra.plugin.core.flow.If
        condition: "{{ outputs['submit-auth-approval'].code == 429 }}"
        then:
          - id: log-auth-rate-limited
            type: io.kestra.plugin.core.log.Log
            message: "⚠️ RATE LIMITED: Max pending approvals exceeded for AUTH SERVICE."
        else:
          - id: check-auth-success
            type: io.kestra.plugin.core.flow.If
            condition: "{{ outputs['submit-auth-approval'].code in [200, 204] }}"
            then:
              - id: log-auth-submitted
                type: io.kestra.plugin.core.log.Log
                message: "✅ AUTH SERVICE restart submitted for approval. Awaiting human decision."
            else:
              - id: log-auth-failed
                type: io.kestra.plugin.core.log.Log
                message: "❌ AUTH SERVICE submission FAILED: HTTP {{ outputs['submit-auth-approval'].code }}"

  # 4. Human-in-the-Loop: Submit approval for Payment Service
  - id: heal-payment
    type: io.kestra.plugin.core.flow.If
    condition: "{{ (outputs['get-payment'].code | default(500)) != 200 }}"
    then:
      - id: log-payment-pending
        type: io.kestra.plugin.core.log.Log
        message: "🕐 PAYMENT SERVICE DOWN - Submitting for approval..."
      - id: submit-payment-approval
        type: io.kestra.plugin.core.http.Request
        uri: http://host.docker.internal:4000/api/approvals/pending
        method: POST
        contentType: application/json
        allowFailure: true
        body: >
          {
            "service": "payment",
            "action": "restart",
            "containerId": "{{ outputs['get-containers'].body | jq('.containers[] | select(.name == \"payment-service\") | .id') | first | replace('\"', '') }}",
            "reason": "Payment service health check failed (HTTP {{ outputs['get-payment'].code | default('N/A') }})"
          }
      - id: check-payment-submission
        type: io.kestra.plugin.core.flow.If
        condition: "{{ outputs['submit-payment-approval'].code == 429 }}"
        then:
          - id: log-payment-rate-limited
            type: io.kestra.plugin.core.log.Log
            message: "⚠️ RATE LIMITED: Max pending approvals exceeded for PAYMENT SERVICE."
        else:
          - id: check-payment-success
            type: io.kestra.plugin.core.flow.If
            condition: "{{ outputs['submit-payment-approval'].code in [200, 204] }}"
            then:
              - id: log-payment-submitted
                type: io.kestra.plugin.core.log.Log
                message: "✅ PAYMENT SERVICE restart submitted for approval. Awaiting human decision."
            else:
              - id: log-payment-failed
                type: io.kestra.plugin.core.log.Log
                message: "❌ PAYMENT SERVICE submission FAILED: HTTP {{ outputs['submit-payment-approval'].code }}"

  # 5. Human-in-the-Loop: Submit approval for Notification Service
  - id: heal-notify
    type: io.kestra.plugin.core.flow.If
    condition: "{{ (outputs['get-notify'].code | default(500)) != 200 }}"
    then:
      - id: log-notify-pending
        type: io.kestra.plugin.core.log.Log
        message: "🕐 NOTIFICATION SERVICE DOWN - Submitting for approval..."
      - id: submit-notify-approval
        type: io.kestra.plugin.core.http.Request
        uri: http://host.docker.internal:4000/api/approvals/pending
        method: POST
        contentType: application/json
        allowFailure: true
        body: >
          {
            "service": "notification",
            "action": "restart",
            "containerId": "{{ outputs['get-containers'].body | jq('.containers[] | select(.name == \"notification-service\") | .id') | first | replace('\"', '') }}",
            "reason": "Notification service health check failed (HTTP {{ outputs['get-notify'].code | default('N/A') }})"
          }
      - id: check-notify-submission
        type: io.kestra.plugin.core.flow.If
        condition: "{{ outputs['submit-notify-approval'].code == 429 }}"
        then:
          - id: log-notify-rate-limited
            type: io.kestra.plugin.core.log.Log
            message: "⚠️ RATE LIMITED: Max pending approvals exceeded for NOTIFICATION SERVICE."
        else:
          - id: check-notify-success
            type: io.kestra.plugin.core.flow.If
            condition: "{{ outputs['submit-notify-approval'].code in [200, 204] }}"
            then:
              - id: log-notify-submitted
                type: io.kestra.plugin.core.log.Log
                message: "✅ NOTIFICATION SERVICE restart submitted for approval. Awaiting human decision."
            else:
              - id: log-notify-failed
                type: io.kestra.plugin.core.log.Log
                message: "❌ NOTIFICATION SERVICE submission FAILED: HTTP {{ outputs['submit-notify-approval'].code }}"

  # 6. AI Analysis (Optional - only if API key is set)
  - id: ai-analysis
    type: io.kestra.plugin.core.flow.If
    condition: >
      {{ 
        (outputs['get-auth'].code | default(500)) != 200 or
        (outputs['get-payment'].code | default(500)) != 200 or
        (outputs['get-notify'].code | default(500)) != 200
      }}
    then:
      - id: call-ai
        type: io.kestra.plugin.core.http.Request
        uri: https://api.groq.com/openai/v1/chat/completions
        method: POST
        allowFailure: true
        headers:
          Authorization: "Bearer {{ secret('GROQ_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "model": "llama-3.3-70b-versatile",
            "messages": [
              {
                "role": "system",
                "content": "You are Sentinel, a DevOps AI. Analyze service health and provide concise status: HEALTHY, DEGRADED, or CRITICAL with brief reasoning."
              },
              {
                "role": "user",
                "content": "Service Health Check Results:\n- Auth: {{ outputs['get-auth'].code | default('DOWN') }}\n- Payment: {{ outputs['get-payment'].code | default('DOWN') }}\n- Notification: {{ outputs['get-notify'].code | default('DOWN') }}\n\nAnalyze the overall system health."
              }
            ],
            "temperature": 0.3,
            "max_tokens": 150
          }

      - id: log-ai-result
        type: io.kestra.plugin.core.log.Log
        message: |
          🤖 SENTINEL AI REPORT:
          {{ outputs['call-ai'].body | jq(".choices[0].message.content") | first | default("AI analysis unavailable") }}

  # 7. Push status to dashboard
  - id: push-to-dashboard
    type: io.kestra.plugin.core.http.Request
    uri: http://host.docker.internal:4000/api/kestra-webhook
    method: POST
    contentType: application/json
    allowFailure: true
    body: |
      {% set auth = outputs['get-auth'] | default({}) %}
      {% set payment = outputs['get-payment'] | default({}) %}
      {% set notify = outputs['get-notify'] | default({}) %}
      {% set aiReport = outputs['call-ai'].body | jq(".choices[0].message.content") | first | default("System monitoring active - Auto-healing enabled") %}

      {
        "aiReport": {{ aiReport | json }},
        "metrics": {
          "auth": { "code": {{ auth.code | default(500) }} },
          "payment": { "code": {{ payment.code | default(500) }} },
          "notification": { "code": {{ notify.code | default(500) }} }
        }
      }


triggers:
  - id: monitor-schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "*/1 * * * *"
    timezone: "Asia/Kolkata"
