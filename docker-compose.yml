networks:
  sentinel-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: sentinel-net
      com.docker.network.driver.mtu: 1500

services:
  # PostgreSQL Database
  # Used by both Kestra (workflow state) and Sentinel RBAC system
  # Port 5432 exposed for local development access
  postgres:
    image: postgres:15
    container_name: kestra-postgres
    environment:
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
      POSTGRES_DB: kestra
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sentinel-net
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kestra" ]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      - "sentinel.monitor=true"
    # Note: For RBAC system, create separate database 'sentinel_rbac'
    # Run: docker exec -it kestra-postgres createdb -U kestra sentinel_rbac
    # Or use backend/quick-setup.js which handles this automatically

  # Kestra Workflow Orchestrator
  kestra:
    image: kestra/kestra:latest
    container_name: kestra
    command: server standalone
    ports:
      - "9090:8080"
    volumes:
      - ./kestra-flows:/app/flows
      - kestra-data:/app/storage
    environment:
      SECRET_GROQ_API_KEY: ${SECRET_GROQ_API_KEY}
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra
        kestra:
          server:
            basic-auth:
              enabled: false
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
            local:
              base-path: /app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sentinel-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    labels:
      - "sentinel.monitor=true"

  # Mock Auth Service
  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "3001:3001"
    networks:
      - sentinel-net
    restart: always
    labels:
      - "sentinel.monitor=true"

  # Mock Payment Service
  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    ports:
      - "3002:3002"
    networks:
      - sentinel-net
    restart: always
    labels:
      - "sentinel.monitor=true"

  # Mock Notification Service
  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    ports:
      - "3003:3003"
    networks:
      - sentinel-net
    restart: always
    labels:
      - "sentinel.monitor=true"

  # Ollama AI (The Brain)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - sentinel-net
    restart: always
    labels:
      - "sentinel.monitor=true"

  # 5. The Backend API (Bridge)
  # COMMENTED OUT - Running locally with node index.js
  # backend:
  #   build: ./backend
  #   container_name: sentinel-backend
  #   environment:
  #     DOCKER_ENV: "true"
  #     # Multi-host Docker configuration (JSON)
  #     # DOCKER_HOSTS: |
  #     #   {
  #     #     "hosts": [
  #     #       { "id": "local", "label": "Local Docker", "socketPath": "/var/run/docker.sock", "type": "local" },
  #     #       { "id": "prod-1", "label": "Production Primary", "host": "tcp://192.168.1.100:2376", "type": "remote", "tls": true },
  #     #       { "id": "staging", "label": "Staging Server", "host": "tcp://staging.example.com:2376", "type": "remote" }
  #     #     ]
  #     #   }
  #   ports:
  #     - "4000:4000"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   networks:
  #     - sentinel-net
  #   restart: always

volumes:
  postgres-data:
  kestra-data:
  ollama-data:

# =============================================================================
# MULTI-HOST DOCKER CONFIGURATION
# =============================================================================
# 
# Sentinel supports monitoring Docker containers across multiple hosts.
# Configure hosts using one of the following methods:
#
# Method 1: Environment Variable (DOCKER_HOSTS)
# Set a JSON configuration in the DOCKER_HOSTS environment variable:
#
#   DOCKER_HOSTS='{"hosts":[{"id":"local","label":"Local Docker","socketPath":"/var/run/docker.sock","type":"local"},{"id":"prod-1","label":"Production","host":"tcp://192.168.1.100:2376","type":"remote","tls":true}]}'
#
# Method 2: Configuration File (backend/config/hosts.json)
# Create a hosts.json file with the following structure:
#
#   {
#     "hosts": [
#       { "id": "local", "label": "Local Docker", "socketPath": "/var/run/docker.sock", "type": "local" },
#       { "id": "prod-1", "label": "Production Primary", "host": "tcp://192.168.1.100:2376", "type": "remote", "tls": true },
#       { "id": "staging", "label": "Staging", "host": "tcp://staging.example.com:2376", "type": "remote" }
#     ]
#   }
#
# Supported Connection Types:
# - local: Unix socket connection (default: /var/run/docker.sock)
# - remote/tcp: TCP connection with optional TLS
# - ssh: SSH tunnel connection (requires ssh2 package)
#
# Docker Swarm Mode:
# When a host is running in Docker Swarm mode, Sentinel will automatically
# detect it and provide Swarm-specific features like service listing,
# node management, and replica scaling.
# =============================================================================
