networks:
  sentinel-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: sentinel-net
      com.docker.network.driver.mtu: 1500

services:
  # HashiCorp Vault - Secret Management
  # Development mode only - stores secrets in memory
  # For production, use persistent storage and proper initialization
  vault:
    image: hashicorp/vault:1.15
    container_name: sentinel-vault
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: sentinel-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK
    networks:
      - sentinel-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 3
    # Note: In dev mode, secrets are stored in memory and lost on restart
    # To initialize secrets after startup, run:
    # docker exec sentinel-vault vault kv put secret/sentinel \
    #   JWT_SECRET=your-jwt-secret \
    #   DB_PASSWORD=your-db-password \
    #   GROQ_API_KEY=your-groq-api-key

  # PostgreSQL Database
  # Used by both Kestra (workflow state) and Sentinel RBAC system
  # Port 5432 exposed for local development access
  postgres:
    image: postgres:15
    container_name: kestra-postgres
    environment:
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
      POSTGRES_DB: kestra
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sentinel-net
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kestra" ]
      interval: 5s
      timeout: 5s
      retries: 5
    # Note: For RBAC system, create separate database 'sentinel_rbac'
    # Run: docker exec -it kestra-postgres createdb -U kestra sentinel_rbac
    # Or use backend/quick-setup.js which handles this automatically

  # Kestra Workflow Orchestrator
  kestra:
    image: kestra/kestra:latest
    container_name: kestra
    command: server standalone
    ports:
      - "9090:8080"
    volumes:
      - ./kestra-flows:/app/flows
      - kestra-data:/app/storage
    environment:
      SECRET_GROQ_API_KEY: ${SECRET_GROQ_API_KEY}
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra
        kestra:
          server:
            basic-auth:
              enabled: false
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
            local:
              base-path: /app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sentinel-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  # Mock Auth Service
  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "3001:3001"
    networks:
      - sentinel-net
    restart: always

  # Mock Payment Service
  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    ports:
      - "3002:3002"
    networks:
      - sentinel-net
    restart: always

  # Mock Notification Service
  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    ports:
      - "3003:3003"
    networks:
      - sentinel-net
    restart: always

  # Ollama AI (The Brain)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - sentinel-net
    restart: always

  # 5. The Backend API (Bridge)
  # COMMENTED OUT - Running locally with node index.js
  # backend:
  #   build: ./backend
  #   container_name: sentinel-backend
  #   environment:
  #     DOCKER_ENV: "true"
  #   ports:
  #     - "4000:4000"
  #   networks:
  #     - sentinel-net
  #   restart: always

volumes:
  postgres-data:
  kestra-data:
  ollama-data:
